<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>Calculator</p>
    <p>
      <button onclick="console.log(updateCalculation('1'));">1</button>
      <button onclick="console.log(updateCalculation('2'));">2</button>
      <button onclick="console.log(updateCalculation('3'));">3</button>
      <button onclick="console.log(updateCalculation(' + '));">+</button>
    </p>
    <p>
      <button onclick="console.log(updateCalculation('4'));">4</button>
      <button onclick="console.log(updateCalculation('5'));">5</button>
      <button onclick="console.log(updateCalculation('6'));">6</button>
      <button onclick="console.log(updateCalculation(' - '));">-</button>
    </p>
    <p>
      <button onclick="console.log(updateCalculation('7'));">7</button>
      <button onclick="console.log(updateCalculation('8'));">8</button>
      <button onclick="console.log(updateCalculation('9'));">9</button>
      <button onclick="console.log(updateCalculation(' * '));">*</button>
    </p>
    <p>
      <button onclick="console.log(updateCalculation('0'));">0</button>
      <button onclick="console.log(updateCalculation('.'));">.</button>
      <button
        onclick="console.log(updateCalculation('='));
      localStorage.setItem('calculation', calculation);"
      >
        =
      </button>
      <button onclick="calculation += ' / '; console.log(calculation);">
        /
      </button>
    </p>
    <p>
      <button
        onclick="console.log(updateCalculation('Clear'));
      localStorage.setItem('calculation', calculation);"
      >
        Clear
      </button>
    </p>

    <script>
      let calculation = localStorage.getItem("calculation") || "";

      function updateCalculation(input) {
        if (input === "=") {
          calculation = eval(calculation);
          return calculation;
        } else if (input === "Clear") {
          calculation = "";
          return calculation;
        } else {
          calculation += input;
          return calculation;
        }
        localStorage.setItem();
      }
    </script>
  </body>
</html>
