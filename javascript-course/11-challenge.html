<!DOCTYPE html>

  <body>
    <script>
      //11l
      function minMax(array) {
        let min = null;
        let max = null;
        for (let i = 0; i < array.length; i++) {
          if (array[i] < min) {
            min = array[i];
          }

          if (array[i] > max) {
            max = array[i];
          }

          if (min === null || max === null) {
            min = max;
          }
        }
        console.log(`{min: ${min}, max: ${max}}`);
      }

      minMax([1, -3, 5]);
      minMax([-2, 3, -5, 7, 10]);

      //11m
      minMax([]);
      minMax([3]);

      //11n
      function countWords(array) {
        let result = {};

        for (let i = 0; i < array.length; i++) {
          let word = array[i];

          if (!result[word]) {
            result[word] = 1;
          } else {
            result[word]++;
          }
        }
        return result;
      }

      console.log(countWords(["apple", "grape", "apple", "apple"]));

      //11v
      for (i = 1; i <= 20; i++) {
        if (i % 3 === 0 && i % 5 === 0) {
          console.log("FizzBuzz");
        } else if (i % 3 === 0 && !(i % 5 === 0)) {
          console.log("Fizz");
        } else if (i % 5 === 0 && !(i % 3 === 0)) {
          console.log("Buzz");
        } else {
          console.log(i);
        }
      }

      //11w
      function findIndex(array, word) {
        let index = -1;

        for (i = 0; i < array.length; i++) {
          if (array[i] === word) {
            index = i;
            break;
          }
        }
        return index;
      }

      function findIndex(array, word) {
        let index = -1;

        for (i = 0; i < array.length; i++) {
          if (array[i] === word) {
            index = i;
            break;
          }
        }
        return index;
      }

      function uniqueArray(array) {
        let result = [];

        for (i = 0; i < array.length; i++) {
          const word = array[i];

          if (findIndex(result, word) === -1) {
            result.push(word);
          }
        }
        return result;
      }

      console.log(uniqueArray(["green", "red", "blue", "red"]));
    </script>
