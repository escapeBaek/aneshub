<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //12j
      function multiply(var1, var2) {
        return var1 * var2;
      }

      console.log(multiply(2, 3));
      console.log(multiply(7, 10));

      //12k
      const multiply2 = (var1, var2) => {
        return var1 * var2;
      };

      console.log(multiply2(2, 3));
      console.log(multiply2(7, 10));

      //12l
      function countPositive(array) {
        let positiveNumbers = 0;

        array.forEach((num) => {
          if (num > 0) {
            positiveNumbers++;
          }
        });

        return positiveNumbers;
      }

      console.log(countPositive([1, -3, 5]));
      console.log(countPositive([-2, 3, -5, 7, 10]));

      //12m
      function addNum(array, num) {
        return array.map((element) => element + num);
      }

      console.log(addNum([1, 2, 3], 2));
      console.log(addNum([-2, -1, 0, 99], 2));

      //12n
      function removeEgg(array) {
        return array.filter((food) => food !== "egg");
      }

      console.log(removeEgg(["egg", "apple", "egg", "egg", "ham"]));

      //12o
      function removeEgg2(array) {
        let eggsRemoved = 0;

        return array.filter((food) => {
          if (food === "egg" && eggsRemoved < 2) {
            eggsRemoved++;
            return false;
          }
          return true;
        });
      }

      console.log(removeEgg2(["egg", "apple", "egg", "egg", "ham"]));

      //12p
    </script>
  </body>
</html>
