<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: black;
      }

      .cs-calculation {
        background-color: black;
        color: white;
        font: Arial;
        font-size: 30px;
        font-weight: bold;
      }

      .cs-number {
        background-color: gray;
        border: none;
        color: white;
        font: Arial;
        font-size: 20px;
        margin: 2px;
        padding: 10px 15px;
        border-radius: 50px;
      }

      .cs-operator {
        background-color: orange;
        border: none;
        color: white;
        font: Arial;
        font-size: 20px;
        margin: 2px;
        padding: 10px 15px;
        border-radius: 50px;
      }
    </style>
  </head>
  <body>
    <p>
      <button
        onclick="
        updateCalculation('1');
      "
        class="cs-number"
      >
        1
      </button>

      <button
        onclick="
        updateCalculation('2');
      "
        class="cs-number"
      >
        2
      </button>

      <button
        onclick="
        updateCalculation('3');
      "
        class="cs-number"
      >
        3
      </button>

      <button
        onclick="
        updateCalculation(' + ');
      "
        class="cs-operator"
      >
        +
      </button>
    </p>

    <p>
      <button
        onclick="
        updateCalculation('4');
      "
        class="cs-number"
      >
        4
      </button>

      <button
        onclick="
        updateCalculation('5');
      "
        class="cs-number"
      >
        5
      </button>

      <button
        onclick="
        updateCalculation('6');
      "
        class="cs-number"
      >
        6
      </button>

      <button
        onclick="
        updateCalculation(' - ');
      "
        class="cs-operator"
      >
        -
      </button>
    </p>

    <p>
      <button
        onclick="
        updateCalculation('7');
      "
        class="cs-number"
      >
        7
      </button>

      <button
        onclick="
        updateCalculation('8');
      "
        class="cs-number"
      >
        8
      </button>

      <button
        onclick="
        updateCalculation('9');
      "
        class="cs-number"
      >
        9
      </button>

      <button
        onclick="
        updateCalculation(' * ');
      "
        class="cs-operator"
      >
        *
      </button>
    </p>

    <p>
      <button
        onclick="
        updateCalculation('0');
      "
        class="cs-number"
      >
        0
      </button>

      <button
        onclick="
        updateCalculation('.');
      "
        class="cs-number"
      >
        .
      </button>

      <button
        onclick="
        calculation = eval(calculation);
        
        // Display the calculation on the page
        // instead of console.log
        displayCalculation();

        localStorage.setItem('calculation', calculation);
      "
        class="cs-number"
      >
        =
      </button>

      <button
        onclick="
        updateCalculation(' / ');
      "
        class="cs-operator"
      >
        /
      </button>
    </p>

    <p>
      <button
        onclick="
        calculation = '';
        
        // Display the calculation on the page
        // instead of console.log
        displayCalculation();

        localStorage.setItem('calculation', calculation);
      "
        class="cs-number"
      >
        Clear
      </button>
    </p>

    <!-- Create an element to display the calculation. -->
    <p class="js-calculation cs-calculation"></p>

    <script>
      let calculation = localStorage.getItem("calculation") || "";

      // Display the calculation when the page first loads.
      displayCalculation();

      function updateCalculation(value) {
        calculation += value;

        // Display the calculation on the page
        // instead of console.log
        displayCalculation();

        localStorage.setItem("calculation", calculation);
      }

      function displayCalculation() {
        document.querySelector(".js-calculation").innerHTML = calculation;
      }
    </script>
  </body>
</html>
