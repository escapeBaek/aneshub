<!--
    fetch("https://goweather.herokuapp.com/weather/Seoul")
  .then((response) => response.json()) 
  여기서 fetch를 통해 가지고 온 데이터를 해당 서버에서 받기 기다려야 하니 then으로 받는다. 즉 이를 통해 데이터를 받으면
  이걸 response를 임시 함수로 받아서 json 형식, 즉 딕셔너리 형식으로 다시 데이터화 한다.
  .then((data) => console.log(data));
  그러면 여기서 이걸 다시 받아서 console log로 보여준다.
-->
